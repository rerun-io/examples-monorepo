[workspace]
authors = ["pablo vela <pablovela5620@gmail.com>"]
channels = ["https://prefix.dev/ai-demos", "https://prefix.dev/conda-forge"]
name = "examples-monorepo"
platforms = ["linux-64", "linux-aarch64"]
version = "0.1.0"
requires-pixi = ">=0.40"
preview = ["pixi-build"]

# ─── pypi-options (workspace-level) ─────────────────────────────────────────
[pypi-options]
no-build-isolation = ["moge", "gsplat", "mini_dpvo"]

[pypi-options.dependency-overrides]
iopath = ">=0.1.10"
fsspec = ">=2025.3"

# ─── common feature (shared loose base deps) ───────────────────────────────
[feature.common.dependencies]
av = "*"
py-opencv = "*"
numpy = "*"
pyserde = ">=0.20,<0.30"
jaxtyping = "<0.3"
typing_extensions = ">=4.1.0,<4.13.0"
hf-transfer = "*"
scipy = "*"
huggingface_hub = "*"
tqdm = "*"
transformers = ">=5.0.0"

[feature.common.target.linux-aarch64.dependencies]
xorg-libx11 = "*"
xorg-xorgproto = "*"

[feature.common.pypi-dependencies]
rerun-sdk = "==0.31.1"
gradio = "==6.8.0"
gradio-rerun = "==0.31.1"
simplecv = { git = "https://github.com/pablovela5620/simplecv.git", tag = "v0.7.2" }


# ─── CUDA 12.9 feature (shared across all GPU envs) ─────────────────────────
# Restrict to linux-64: the CUDA toolchain, pytorch-gpu, and GPU-only deps
# like torchcodec don't have conda-forge builds for linux-aarch64.
[feature.cuda]
platforms = ["linux-64"]

[feature.cuda.system-requirements]
cuda = "12.9"

[feature.cuda.dependencies]
# CUDA Build Tools
cuda-compiler = "*"
cuda-version = "12.9.*"
cuda-cudart-dev = "*"
cuda-crt = "*"
libcusparse-dev = "*"
cuda-driver-dev = "*"
cuda-nvcc = "*"
cuda-nvrtc-dev = "*"
cuda-nvtx = "*"
cuda-nvtx-dev = "*"
cuda-nvml-dev = "*"
cuda-profiler-api = "*"
# CUDA Libraries
cudnn = "*"
libcublas-dev = "*"
libcudss-dev = "*"
libcufile-dev = "*"
libcufft-dev = "*"
libcurand-dev = "*"
libcusolver-dev = "*"
cusparselt = "*"
libnvjitlink = "*"
# PyTorch
pytorch-gpu = ">=2.8.0"
torchvision = "*"

# ─── ide feature (standalone dev env for Zed/IDE tooling) ────────────────────
[feature.ide.dependencies]
python = "3.12.*"

# ─── dev feature (shared across all *-dev envs) ─────────────────────────────
[feature.dev.dependencies]
ruff = "*"
pytest = ">=8.0.0,<9"
beartype = ">=0.22.9"
pyrefly = "*"
hypothesis = "*"
vulture = "*"

[feature.dev.pypi-dependencies]
types-tqdm = "*"

[feature.dev.activation.env]
PIXI_DEV_MODE = "1"

[feature.dev.tasks.lint]
cmd = "cd $PACKAGE_DIR && ruff check ."
description = "Lint the package"

[feature.dev.tasks.typecheck]
cmd = "cd $PACKAGE_DIR && pyrefly check -c ../../pyrefly.toml ."
description = "Typecheck the package"

[feature.dev.tasks.deadcode]
cmd = "cd $PACKAGE_DIR && vulture --config pyproject.toml"
description = "Find dead code in the package"

[feature.dev.tasks.tests]
cmd = "cd $PACKAGE_DIR && pytest -q"
description = "Run package tests"

# ═══════════════════════════════════════════════════════════════════════════
# monoprior
# ═══════════════════════════════════════════════════════════════════════════
[feature.monoprior.dependencies]
python = "3.12.*"
icecream = ">=2.1.3,<2.2"
einops = ">=0.8.0,<0.9"
matplotlib = ">=3.8.3,<3.9"
wandb = ">=0.19.10,<0.20"
pandas = ">=2.3.3,<2.4"
jupyterlab = ">=4.2.0,<4.3"
tyro = ">=0.9.1,<0.10"
open3d = ">=0.19.0,<0.20"
easydict = ">=1.13,<2"
imageio = ">=2.37.0,<3"
imageio-ffmpeg = ">=0.6.0,<0.7"
natsort = ">=8.4.0,<9"

[feature.monoprior.pypi-dependencies]
monopriors = { path = "packages/monoprior", editable = true }
vggt = { git = "https://github.com/pablovela5620/vggt.git", rev = "5ed6ec88a951f27959f73bc72eb4b6dc7a028b0c" }
moge = { git = "https://github.com/microsoft/MoGe.git" }

[feature.monoprior.activation.env]
PACKAGE_DIR = "packages/monoprior"

# ── Download tasks (hidden, used as depends-on) ─────────────────────────
[feature.monoprior.tasks._download-single-image]
cmd = "test -d data/examples/single-image || hf download pablovela5620/monoprior-example --include 'single-image/*' --repo-type dataset --local-dir data/examples/"
cwd = "packages/monoprior"

[feature.monoprior.tasks._download-multiview]
cmd = "test -d data/examples/multiview || hf download pablovela5620/monoprior-example --include 'multiview/*' --repo-type dataset --local-dir data/examples/"
cwd = "packages/monoprior"

[feature.monoprior.tasks._download-video]
cmd = "test -d data/examples/video || hf download pablovela5620/monoprior-example --include 'video/*' --repo-type dataset --local-dir data/examples/"
cwd = "packages/monoprior"

[feature.monoprior.tasks._download-polycam]
cmd = "test -d data/examples/polycam || hf download pablovela5620/monoprior-example --include 'polycam/*' --repo-type dataset --local-dir data/examples/"
cwd = "packages/monoprior"

# ── Demo tasks ───────────────────────────────────────────────────────────
[feature.monoprior.tasks.relative-depth]
cmd = "python tools/demos/relative_depth.py --image-path data/examples/single-image/room.jpg"
depends-on = ["_download-single-image"]
cwd = "packages/monoprior"
description = "Run relative depth estimation on example image"

[feature.monoprior.tasks.multiview-depth]
cmd = "python tools/demos/multiview_depth.py --image-dir data/examples/multiview/car_landscape_12"
depends-on = ["_download-multiview"]
cwd = "packages/monoprior"
description = "Run VGGT multiview depth on example images"

[feature.monoprior.tasks.multiview-calibration]
cmd = "python tools/demos/multiview_calibration.py --image-dir data/examples/multiview/car_landscape_12"
depends-on = ["_download-multiview"]
cwd = "packages/monoprior"
description = "Run multiview calibration on example images"

[feature.monoprior.tasks.video-depth]
cmd = "python tools/demos/video_depth.py --video-path data/examples/video/davis_rollercoaster.mp4"
depends-on = ["_download-video"]
cwd = "packages/monoprior"
description = "Run video depth estimation on example video"

[feature.monoprior.tasks.polycam-inference]
cmd = "python tools/demos/polycam_inference.py --polycam-zip-path data/examples/polycam/example-room-scan-poly.zip"
depends-on = ["_download-polycam"]
cwd = "packages/monoprior"
description = "Run monoprior inference on Polycam dataset"

[feature.monoprior.tasks.promptda-polycam]
cmd = "python tools/demos/promptda_polycam.py --polycam-zip-path data/examples/polycam/example-room-scan-poly.zip"
depends-on = ["_download-polycam"]
cwd = "packages/monoprior"
description = "Run PromptDA depth completion on Polycam dataset"

[feature.monoprior.tasks.metric-depth]
cmd = "python tools/demos/metric_depth.py --image-path data/examples/single-image/room.jpg"
depends-on = ["_download-single-image"]
cwd = "packages/monoprior"
description = "Run metric depth estimation on example image"

[feature.monoprior.tasks.surface-normals]
cmd = "python tools/demos/surface_normals.py --image-path data/examples/single-image/room.jpg"
depends-on = ["_download-single-image"]
cwd = "packages/monoprior"
description = "Run surface normal estimation on example image"

[feature.monoprior.tasks.monoprior]
cmd = "python tools/demos/monoprior.py --image-path data/examples/single-image/room.jpg"
depends-on = ["_download-single-image"]
cwd = "packages/monoprior"
description = "Run monoprior (metric depth + normals) on example image"

# ── App tasks (Gradio UIs) ──────────────────────────────────────────────
[feature.monoprior.tasks.depth-compare-app]
cmd = "python tools/apps/depth_compare_app.py"
cwd = "packages/monoprior"
description = "Launch Gradio depth comparison UI"

[feature.monoprior.tasks.calibration-app]
cmd = "python tools/apps/calibration_app.py"
cwd = "packages/monoprior"
description = "Launch Gradio multiview calibration UI"

[feature.monoprior.tasks.multiview-geometry-app]
cmd = "python tools/apps/multiview_geometry_app.py"
cwd = "packages/monoprior"
description = "Launch Gradio multiview geometry UI"

[feature.monoprior.tasks.metric-depth-app]
cmd = "python tools/apps/metric_depth_app.py"
cwd = "packages/monoprior"
description = "Launch Gradio metric depth UI"

[feature.monoprior.tasks.depth-alignment-app]
cmd = "python tools/apps/depth_alignment_app.py"
cwd = "packages/monoprior"
description = "Launch Gradio depth alignment UI"

# ── Utility tasks ────────────────────────────────────────────────────────
[feature.monoprior.tasks.build-wheel]
cmd = "python -m pip install build && python -m build"
cwd = "packages/monoprior"

[feature.monoprior.tasks.upload-pypi]
cmd = "python -m pip install twine && twine check dist/*"
cwd = "packages/monoprior"

[feature.monoprior.tasks.upload-hf]
cmd = "python tools/utils/upload_to_hf.py"
depends-on = ["build-wheel"]
cwd = "packages/monoprior"

