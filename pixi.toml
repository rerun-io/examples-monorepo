# gsplat-rust-renderer
# ═══════════════════════════════════════════════════════════════════════════
[feature.gsplat-rust-renderer.dependencies]
python = "3.12.*"
rust = "1.93.*"
clang = "*"
cmake = "*"
pkg-config = "*"
numpy = "*"
jaxtyping = "<0.3"
typing_extensions = ">=4.1.0,<4.13.0"
av = "*"
py-opencv = "*"
huggingface_hub = "*"
hf-transfer = "*"
tyro = ">=0.9.1,<0.10"
pyserde = ">=0.20,<0.30"
# CPU-only PyTorch for lpips metrics (no CUDA requirement).
pytorch-cpu = ">=2.8.0"
torchvision = "*"

[feature.gsplat-rust-renderer.target.linux-64.dependencies]
libxkbcommon = "*"
wayland = "*"
xorg-libx11 = "*"
xorg-libxcursor = "*"
xorg-libxi = "*"
xorg-libxinerama = "*"
xorg-libxrandr = "*"
brush = "==0.3.0"

[feature.gsplat-rust-renderer.pypi-dependencies]
gsplat-rust-renderer = { path = "packages/gsplat-rust-renderer", editable = true }
lpips = ">=0.1.4,<1"
plyfile = ">=1.1,<2"
rerun-sdk = "==0.31.1"
simplecv = { git = "https://github.com/pablovela5620/simplecv.git", tag = "v0.7.2" }

[feature.gsplat-rust-renderer.activation.env]
PACKAGE_DIR = "packages/gsplat-rust-renderer"

# ── Download tasks ───────────────────────────────────────────────────────
[feature.gsplat-rust-renderer.tasks._download-chair-ply]
cmd = "test -e examples/chair.ply || hf download pablovela5620/splat-dataset chair.ply --repo-type dataset --local-dir examples/"
cwd = "packages/gsplat-rust-renderer"
description = "Download example chair PLY from HuggingFace"

[feature.gsplat-rust-renderer.tasks._download-tandt]
cmd = """
test -d data/tandt || \
(mkdir -p data && \
wget -q --show-progress -O data/tandt_db.zip https://repo-sam.inria.fr/fungraph/3d-gaussian-splatting/datasets/input/tandt_db.zip && \
unzip -q data/tandt_db.zip -d data && \
rm data/tandt_db.zip)
"""
cwd = "packages/gsplat-rust-renderer"
outputs = ["packages/gsplat-rust-renderer/data/tandt/"]
description = "Download Tanks & Temples + Deep Blending datasets from INRIA"

[feature.gsplat-rust-renderer.tasks._download-nerf-lego]
cmd = "test -d data/nerf-synthetic/lego || hf download pablovela5620/nerf-synthetic-mirror --include 'lego/*' --repo-type dataset --local-dir data/nerf-synthetic/"
cwd = "packages/gsplat-rust-renderer"
description = "Download NeRF Synthetic lego scene from HuggingFace"

[feature.gsplat-rust-renderer.tasks._download-nerf-hotdog]
cmd = "test -d data/nerf-synthetic/hotdog || hf download pablovela5620/nerf-synthetic-mirror --include 'hotdog/*' --repo-type dataset --local-dir data/nerf-synthetic/"
cwd = "packages/gsplat-rust-renderer"
description = "Download NeRF Synthetic hotdog scene from HuggingFace"

[feature.gsplat-rust-renderer.tasks._download-nerf-drums]
cmd = "test -d data/nerf-synthetic/drums || hf download pablovela5620/nerf-synthetic-mirror --include 'drums/*' --repo-type dataset --local-dir data/nerf-synthetic/"
cwd = "packages/gsplat-rust-renderer"
description = "Download NeRF Synthetic drums scene from HuggingFace"

[feature.gsplat-rust-renderer.tasks._download-nerf-ship]
cmd = "test -d data/nerf-synthetic/ship || hf download pablovela5620/nerf-synthetic-mirror --include 'ship/*' --repo-type dataset --local-dir data/nerf-synthetic/"
cwd = "packages/gsplat-rust-renderer"
description = "Download NeRF Synthetic ship scene from HuggingFace"

# ── Brush training tasks ─────────────────────────────────────────────────
[feature.gsplat-rust-renderer.tasks.brush-train-truck]
cmd = """
brush_app data/tandt/truck \
  --total-steps 30000 \
  --export-every 30000 \
  --export-path data/trained \
  --export-name truck.ply
"""
depends-on = ["_download-tandt"]
cwd = "packages/gsplat-rust-renderer"
description = "Train Gaussian splats on truck scene (30K steps)"

[feature.gsplat-rust-renderer.tasks.brush-train-train]
cmd = """
brush_app data/tandt/train \
  --total-steps 30000 \
  --export-every 30000 \
  --export-path data/trained \
  --export-name train.ply
"""
depends-on = ["_download-tandt"]
cwd = "packages/gsplat-rust-renderer"
description = "Train Gaussian splats on train scene (30K steps)"

[feature.gsplat-rust-renderer.tasks.brush-train-lego]
cmd = """
brush_app data/nerf-synthetic/lego \
  --total-steps 30000 \
  --export-every 30000 \
  --export-path data/trained \
  --export-name lego.ply
"""
depends-on = ["_download-nerf-lego"]
cwd = "packages/gsplat-rust-renderer"
description = "Train Gaussian splats on NeRF Synthetic lego scene (30K steps)"

[feature.gsplat-rust-renderer.tasks.brush-train-hotdog]
cmd = """
brush_app data/nerf-synthetic/hotdog \
  --total-steps 30000 \
  --export-every 30000 \
  --export-path data/trained \
  --export-name hotdog.ply
"""
depends-on = ["_download-nerf-hotdog"]
cwd = "packages/gsplat-rust-renderer"
description = "Train Gaussian splats on NeRF Synthetic hotdog scene (30K steps)"

[feature.gsplat-rust-renderer.tasks._download-nerf-chair]
cmd = "test -d data/nerf-synthetic/chair || hf download pablovela5620/nerf-synthetic-mirror --include 'chair/*' --repo-type dataset --local-dir data/nerf-synthetic/"
cwd = "packages/gsplat-rust-renderer"
description = "Download NeRF Synthetic chair scene from HuggingFace"

[feature.gsplat-rust-renderer.tasks._download-trained-plys]
cmd = "mkdir -p data/trained && (test -f data/trained/chair.ply || hf download pablovela5620/nerf-synthetic-mirror --include 'trained/chair.ply' --repo-type dataset --local-dir data/) && (test -f data/trained/hotdog.ply || hf download pablovela5620/nerf-synthetic-mirror --include 'trained/hotdog.ply' --repo-type dataset --local-dir data/)"
cwd = "packages/gsplat-rust-renderer"
description = "Download pre-trained Gaussian splat PLYs for chair and hotdog"

[feature.gsplat-rust-renderer.tasks.brush-train-chair]
cmd = """
brush_app data/nerf-synthetic/chair \
  --total-steps 30000 \
  --export-every 30000 \
  --export-path data/trained \
  --export-name chair.ply
"""
depends-on = ["_download-nerf-chair"]
cwd = "packages/gsplat-rust-renderer"
description = "Train Gaussian splats on NeRF Synthetic chair scene (30K steps)"

# ── Standalone render CLI ────────────────────────────────────────────────
[feature.gsplat-rust-renderer.tasks.render]
cmd = "cargo run --release --no-default-features --bin gsplat-render --"
cwd = "packages/gsplat-rust-renderer"
description = "Render a PLY at a NeRF camera position to PNG (no Rerun needed)"

# ── Rust tasks ───────────────────────────────────────────────────────────
[feature.gsplat-rust-renderer.tasks.viewer]
cmd = "cargo run --release --bin gsplat-rust-renderer"
cwd = "packages/gsplat-rust-renderer"
description = "Launch the Rerun viewer with Gaussian splat visualization"

[feature.gsplat-rust-renderer.tasks.fmt]
cmd = "cargo fmt --all"
cwd = "packages/gsplat-rust-renderer"
description = "Format Rust code"

[feature.gsplat-rust-renderer.tasks.clippy]
cmd = "cargo clippy --all-targets -- -D warnings"
cwd = "packages/gsplat-rust-renderer"
description = "Run clippy on Rust code"

[feature.gsplat-rust-renderer.tasks.rust-test]
cmd = "cargo test"
cwd = "packages/gsplat-rust-renderer"
description = "Run Rust test suite"

# ── Python demo tasks ────────────────────────────────────────────────────
[feature.gsplat-rust-renderer.tasks.log-ply]
cmd = "python tools/log_gaussian_ply.py --rr-config.connect --rr-config.application-id gsplat-rust-renderer"
depends-on = ["_download-chair-ply"]
cwd = "packages/gsplat-rust-renderer"
description = "Load example PLY and log it to the running viewer"

# ═══════════════════════════════════════════════════════════════════════════
# mini-dpvo
# ═══════════════════════════════════════════════════════════════════════════
[feature.mini-dpvo]
channels = ["https://prefix.dev/ai-demos", "https://prefix.dev/conda-forge"]
platforms = ["linux-64"]

[feature.mini-dpvo.dependencies]
python = "3.11.*"
eigen = ">=3.4.0,<3.5"
einops = ">=0.8.0,<0.9"
matplotlib = ">=3.8.4,<3.9"
icecream = ">=2.1.3,<2.2"
lietorch = ">=0.3.0"
plyfile = ">=1.0.3,<1.1"
tyro = ">=0.9.1,<0.10"

[feature.mini-dpvo.pypi-dependencies]
mini_dpvo = { path = "packages/mini-dpvo", editable = true }
mini-dust3r = ">=0.1.1,<0.2"
evo = ">=1.28.0"
opencv-python = ">=4.9.0.80"

[feature.mini-dpvo.activation.env]
PACKAGE_DIR = "packages/mini-dpvo"

# ── Download tasks (hidden, used as depends-on) ─────────────────────────
[feature.mini-dpvo.tasks._download-dpvo-model]
cmd = "hf download pablovela5620/dpvo dpvo.pth --repo-type model --local-dir checkpoints/"
cwd = "packages/mini-dpvo"
outputs = ["packages/mini-dpvo/checkpoints/dpvo.pth"]
description = "Download DPVO model checkpoint"

[feature.mini-dpvo.tasks._download-dpvo-data]
cmd = "bash -lc 'hf download pablovela5620/dpvo-example-data movies.zip --repo-type dataset --local-dir . && unzip -o movies.zip -d data/ && rm -f movies.zip && if [ -d data/data/movies ]; then rm -rf data/movies && mv data/data/movies data/movies && rmdir data/data 2>/dev/null || true; fi'"
cwd = "packages/mini-dpvo"
outputs = ["packages/mini-dpvo/data/movies/IMG_0493.MOV"]
description = "Download DPVO example video data"

[feature.mini-dpvo.tasks._download-dpvo-iphone-data]
cmd = "hf download pablovela5620/dpvo-example-data pool.MOV --repo-type dataset --local-dir data/iphone/"
cwd = "packages/mini-dpvo"
outputs = ["packages/mini-dpvo/data/iphone/pool.MOV"]
description = "Download DPVO iPhone example data"

# ── Build tasks ──────────────────────────────────────────────────────────
[feature.mini-dpvo.tasks._build-dpvo-cuda-kernels]
cmd = "python setup.py build_ext --inplace"
cwd = "packages/mini-dpvo"
description = "Build mini-dpvo CUDA extensions (cuda_corr, cuda_ba)"
inputs = [
    "packages/mini-dpvo/setup.py",
    "packages/mini-dpvo/mini_dpvo/altcorr/*.cpp",
    "packages/mini-dpvo/mini_dpvo/altcorr/*.cu",
    "packages/mini-dpvo/mini_dpvo/fastba/*.cpp",
    "packages/mini-dpvo/mini_dpvo/fastba/*.cu",
]
outputs = ["packages/mini-dpvo/mini_dpvo/_cuda_corr*.so", "packages/mini-dpvo/mini_dpvo/_cuda_ba*.so"]

# ── Demo tasks ───────────────────────────────────────────────────────────
[feature.mini-dpvo.tasks.dpvo-demo]
cmd = "python tools/demo.py --imagedir data/movies/IMG_0493.MOV"
depends-on = ["_build-dpvo-cuda-kernels", "_download-dpvo-model", "_download-dpvo-data"]
cwd = "packages/mini-dpvo"
description = "Run DPVO demo on example video"

# ── App tasks ────────────────────────────────────────────────────────────
[feature.mini-dpvo.tasks.dpvo-app]
cmd = "python tools/gradio_app.py"
depends-on = ["_build-dpvo-cuda-kernels", "_download-dpvo-model", "_download-dpvo-data", "_download-dpvo-iphone-data"]
cwd = "packages/mini-dpvo"
description = "Launch DPVO Gradio web UI"

