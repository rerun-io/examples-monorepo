[workspace]
authors = ["pablo vela <pablovela5620@gmail.com>"]
channels = ["https://prefix.dev/ai-demos", "https://prefix.dev/conda-forge"]
name = "examples-monorepo"
platforms = ["linux-64"]
version = "0.1.0"
requires-pixi = ">=0.40"

# ─── pypi-options (workspace-level) ─────────────────────────────────────────
[pypi-options]
no-build-isolation = ["moge"]

[pypi-options.dependency-overrides]
iopath = ">=0.1.10"
gradio = ">=6.0.0,<7"
fsspec = ">=2025.3"

# ─── common feature (shared loose base deps) ───────────────────────────────
[feature.common.dependencies]
av = "*"
rerun-sdk = ">=0.28.1,<0.29"
py-opencv = "*"
numpy = "*"
pyserde = "*"
jaxtyping = "*"
hf-transfer = "*"
scipy = "*"
huggingface_hub = "*"
tqdm = "*"
transformers = ">=5.0.0"
[feature.common.pypi-dependencies]
gradio = "*"
gradio-rerun = "*"

# ─── CUDA 12.9 feature (shared across all GPU envs) ─────────────────────────
[feature.cuda.system-requirements]
cuda = "12.9"

[feature.cuda.dependencies]
# CUDA Build Tools
cuda-compiler = "*"
cuda-version = "12.9.*"
cuda-cudart-dev = "*"
cuda-crt = "*"
libcusparse-dev = "*"
cuda-driver-dev = "*"
cuda-nvcc = "*"
cuda-nvrtc-dev = "*"
cuda-nvtx = "*"
cuda-nvtx-dev = "*"
cuda-nvml-dev = "*"
cuda-profiler-api = "*"
# CUDA Libraries
cudnn = "*"
libcublas-dev = "*"
libcudss-dev = "*"
libcufile-dev = "*"
libcufft-dev = "*"
libcurand-dev = "*"
libcusolver-dev = "*"
cusparselt = "*"
libnvjitlink = "*"
# PyTorch
pytorch-gpu = ">=2.8.0"
torchvision = "*"

# ─── ide feature (standalone dev env for Zed/IDE tooling) ────────────────────
[feature.ide.dependencies]
python = "3.12.*"

# ─── dev feature (shared across all *-dev envs) ─────────────────────────────
[feature.dev.dependencies]
ruff = "*"
pytest = ">=8.0.0,<9"
beartype = ">=0.22.9"
pyrefly = "*"
hypothesis = "*"

[feature.dev.pypi-dependencies]
types-tqdm = "*"

[feature.dev.activation.env]
PIXI_DEV_MODE = "1"

[feature.dev.tasks.lint]
cmd = "cd $PACKAGE_DIR && ruff check ."
description = "Lint the package"

[feature.dev.tasks.typecheck]
cmd = "cd $PACKAGE_DIR && pyrefly check"
description = "Typecheck the package"

[feature.dev.tasks.tests]
cmd = "cd $PACKAGE_DIR && pytest -q"
description = "Run package tests"

# ═══════════════════════════════════════════════════════════════════════════
# monoprior
# ═══════════════════════════════════════════════════════════════════════════
[feature.monoprior.dependencies]
python = "3.12.*"
jaxtyping = ">=0.2.36,<0.3"
av = ">=15.1.0,<16"
icecream = ">=2.1.3,<2.2"
einops = ">=0.8.0,<0.9"
matplotlib = ">=3.8.3,<3.9"
wandb = ">=0.19.10,<0.20"
pandas = ">=2.2.2,<2.3"
jupyterlab = ">=4.2.0,<4.3"
tyro = ">=0.9.1,<0.10"
open3d = ">=0.19.0,<0.20"
easydict = ">=1.13,<2"
imageio = ">=2.37.0,<3"
imageio-ffmpeg = ">=0.6.0,<0.7"
natsort = ">=8.4.0,<9"

[feature.monoprior.pypi-dependencies]
monopriors = { path = "packages/monoprior", editable = true }
simplecv = { git = "https://github.com/pablovela5620/simplecv.git", rev = "ab88369f5d0353ffb245de6d5981b0aede0930d7" }
vggt = { git = "https://github.com/pablovela5620/vggt.git", rev = "5ed6ec88a951f27959f73bc72eb4b6dc7a028b0c" }
moge = { git = "https://github.com/microsoft/MoGe.git" }

[feature.monoprior.activation.env]
PACKAGE_DIR = "packages/monoprior"

# ── Download tasks (hidden, used as depends-on) ─────────────────────────
[feature.monoprior.tasks._download-single-image]
cmd = "test -d data/examples/single-image || hf download pablovela5620/monoprior-example --include 'single-image/*' --repo-type dataset --local-dir data/examples/"
cwd = "packages/monoprior"

[feature.monoprior.tasks._download-multiview]
cmd = "test -d data/examples/multiview || hf download pablovela5620/monoprior-example --include 'multiview/*' --repo-type dataset --local-dir data/examples/"
cwd = "packages/monoprior"

[feature.monoprior.tasks._download-video]
cmd = "test -d data/examples/video || hf download pablovela5620/monoprior-example --include 'video/*' --repo-type dataset --local-dir data/examples/"
cwd = "packages/monoprior"

[feature.monoprior.tasks._download-polycam]
cmd = "test -d data/examples/polycam || hf download pablovela5620/monoprior-example --include 'polycam/*' --repo-type dataset --local-dir data/examples/"
cwd = "packages/monoprior"

# ── Demo tasks ───────────────────────────────────────────────────────────
[feature.monoprior.tasks.relative-depth]
cmd = "python tools/demos/relative_depth.py --image-path data/examples/single-image/room.jpg"
depends-on = ["_download-single-image"]
cwd = "packages/monoprior"
description = "Run relative depth estimation on example image"

[feature.monoprior.tasks.multiview-depth]
cmd = "python tools/demos/multiview_depth.py --image-dir data/examples/multiview/car_landscape_12"
depends-on = ["_download-multiview"]
cwd = "packages/monoprior"
description = "Run VGGT multiview depth on example images"

[feature.monoprior.tasks.multiview-calibration]
cmd = "python tools/demos/multiview_calibration.py --image-dir data/examples/multiview/car_landscape_12"
depends-on = ["_download-multiview"]
cwd = "packages/monoprior"
description = "Run multiview calibration on example images"

[feature.monoprior.tasks.video-depth]
cmd = "python tools/demos/video_depth.py --video-path data/examples/video/davis_rollercoaster.mp4"
depends-on = ["_download-video"]
cwd = "packages/monoprior"
description = "Run video depth estimation on example video"

[feature.monoprior.tasks.polycam-inference]
cmd = "python tools/demos/polycam_inference.py --polycam-zip-path data/examples/polycam/example-room-scan-poly.zip"
depends-on = ["_download-polycam"]
cwd = "packages/monoprior"
description = "Run monoprior inference on Polycam dataset"

[feature.monoprior.tasks.promptda-polycam]
cmd = "python tools/demos/promptda_polycam.py --polycam-zip-path data/examples/polycam/example-room-scan-poly.zip"
depends-on = ["_download-polycam"]
cwd = "packages/monoprior"
description = "Run PromptDA depth completion on Polycam dataset"

[feature.monoprior.tasks.metric-depth]
cmd = "python tools/demos/metric_depth.py --image-path data/examples/single-image/room.jpg"
depends-on = ["_download-single-image"]
cwd = "packages/monoprior"
description = "Run metric depth estimation on example image"

[feature.monoprior.tasks.surface-normals]
cmd = "python tools/demos/surface_normals.py --image-path data/examples/single-image/room.jpg"
depends-on = ["_download-single-image"]
cwd = "packages/monoprior"
description = "Run surface normal estimation on example image"

[feature.monoprior.tasks.monoprior]
cmd = "python tools/demos/monoprior.py --image-path data/examples/single-image/room.jpg"
depends-on = ["_download-single-image"]
cwd = "packages/monoprior"
description = "Run monoprior (metric depth + normals) on example image"

# ── App tasks (Gradio UIs) ──────────────────────────────────────────────
[feature.monoprior.tasks.depth-compare-app]
cmd = "python tools/apps/depth_compare_app.py"
cwd = "packages/monoprior"
description = "Launch Gradio depth comparison UI"

[feature.monoprior.tasks.calibration-app]
cmd = "python tools/apps/calibration_app.py"
cwd = "packages/monoprior"
description = "Launch Gradio multiview calibration UI"

# ── Utility tasks ────────────────────────────────────────────────────────
[feature.monoprior.tasks.build-wheel]
cmd = "python -m pip install build && python -m build"
cwd = "packages/monoprior"

[feature.monoprior.tasks.upload-pypi]
cmd = "python -m pip install twine && twine check dist/*"
cwd = "packages/monoprior"

[feature.monoprior.tasks.upload-hf]
cmd = "python tools/utils/upload_to_hf.py"
depends-on = ["build-wheel"]
cwd = "packages/monoprior"

# ═══════════════════════════════════════════════════════════════════════════
# wilor-nano
# ═══════════════════════════════════════════════════════════════════════════
[feature.wilor.dependencies]
python = "3.12.*"
jaxtyping = "<0.3.0"
av = ">=16.0.1,<17"
dill = ">=0.4.0,<0.5"

[feature.wilor.pypi-dependencies]
wilor_nano = { path = "packages/wilor-nano", editable = true }
simplecv = { git = "https://github.com/pablovela5620/simplecv.git", rev = "31cc852429cc292959f30c0277010ec57caa6caf" }
rtmlib = { git = "https://github.com/pablovela5620/rtmlib.git", rev = "98bca2193c39b349034b280803b54c9ee58f7c68" }

[feature.wilor.activation.env]
PACKAGE_DIR = "packages/wilor-nano"

[feature.wilor.tasks.wilor-image-example]
cmd = "python tools/wilor_inference.py --image-path assets/img.png"
cwd = "packages/wilor-nano"
description = "Run WiLoR inference on example image"

[feature.wilor.tasks.wilor-video-example]
cmd = "python tools/wilor_inference.py --video-path assets/video.mp4"
cwd = "packages/wilor-nano"
description = "Run WiLoR inference on example video"

# ═══════════════════════════════════════════════════════════════════════════
# sam3d-body-rerun
# ═══════════════════════════════════════════════════════════════════════════
[feature.sam3d.dependencies]
python = "3.12.*"
jaxtyping = "<0.3.0"
av = ">=16.0.1,<17"
tomlkit = "==0.12.0"
audioop-lts = "*"
pydub = "*"
open3d = ">=0.19.0,<0.20"
h5py = ">=3.11"
torchcodec = "*"

[feature.sam3d.pypi-dependencies]
sam3d_body = { path = "packages/sam3d-body-rerun", editable = true }
moge = { git = "https://github.com/microsoft/MoGe.git" }
simplecv = { git = "https://github.com/pablovela5620/simplecv.git", rev = "804e95c588b4af5be50874288eb8929ef2450f74" }
timm = ">=0.9"
natsort = ">=8.4"
datasets = ">=2.20"
fsspec = ">=2025.3"
kernels = ">=0.11.3"

[feature.sam3d.activation.env]
PACKAGE_DIR = "packages/sam3d-body-rerun"

[feature.sam3d.tasks.sam3d-app]
cmd = "python tool/gradio_sam3d_body.py"
cwd = "packages/sam3d-body-rerun"
description = "Launch SAM3D Gradio app"

[feature.sam3d.tasks.sam3d-cli]
cmd = "python tool/demo.py --image-folder data/example-data"
cwd = "packages/sam3d-body-rerun"
description = "Run SAM3D CLI demo"

[feature.sam3d.tasks.sam3d-download-hocap-sample]
cmd = """
test -d data/sample || \
(hf download pablovela5620/hocap-sample sample.zip --repo-type dataset --local-dir data && \
unzip -o data/sample.zip -d data && \
rm data/sample.zip)
"""
cwd = "packages/sam3d-body-rerun"
outputs = ["packages/sam3d-body-rerun/data/sample/"]
description = "Download HoCap sample data from HuggingFace"

[feature.sam3d.tasks.sam3d-mv-video-demo]
cmd = """
python tool/demo_mv_video.py \
    --max-frames 100 \
    hocap \
    --root-directory data/sample \
    --subject-id 8 \
    --sequence-name 20231024_180733
"""
cwd = "packages/sam3d-body-rerun"
depends-on = ["sam3d-download-hocap-sample"]
description = "Run multiview video SAM3 segmentation demo with TSDF fusion"

[feature.sam3d.tasks.sam3d-mv-body-demo]
cmd = """
python tool/demo_mv_body.py \
    --max-frames 50 \
    hocap \
    --root-directory data/sample \
    --subject-id 8 \
    --sequence-name 20231024_180733
"""
cwd = "packages/sam3d-body-rerun"
depends-on = ["sam3d-download-hocap-sample"]
description = "Multiview 3D body mesh fitting with per-camera estimation"

# ═══════════════════════════════════════════════════════════════════════════
# sam3-rerun
# ═══════════════════════════════════════════════════════════════════════════
[feature.sam3-rerun.dependencies]
python = "3.12.*"
jaxtyping = "<0.3.0"

[feature.sam3-rerun.pypi-dependencies]
sam3-rerun = { path = "packages/sam3-rerun", editable = true }
simplecv = { git = "https://github.com/pablovela5620/simplecv.git", rev = "804e95c588b4af5be50874288eb8929ef2450f74" }
spaces = ">=0.43.0"

[feature.sam3-rerun.activation.env]
PACKAGE_DIR = "packages/sam3-rerun"

[feature.sam3-rerun.tasks.sam3-video-batch]
cmd = "python tools/demos/video_batch.py"
cwd = "packages/sam3-rerun"
description = "Batch video segmentation with SAM3"

[feature.sam3-rerun.tasks.sam3-video-chunk]
cmd = "python tools/demos/video_chunk.py"
cwd = "packages/sam3-rerun"
description = "Chunk-based video segmentation with SAM3 (memory-efficient)"

[feature.sam3-rerun.tasks.sam3-video-stream]
cmd = "python tools/demos/video_stream.py"
cwd = "packages/sam3-rerun"
description = "Streaming video segmentation with SAM3 (constant memory)"

[feature.sam3-rerun.tasks.sam3-rerun-app]
cmd = "python tools/apps/sam3_rerun_app.py"
cwd = "packages/sam3-rerun"
description = "Launch SAM3 segmentation Gradio app with Rerun viewer"

[feature.sam3-rerun.tasks.sam3-annotated-app]
cmd = "python tools/apps/sam3_annotated_app.py"
cwd = "packages/sam3-rerun"
description = "Launch SAM3 segmentation Gradio app with annotated image"

# ═══════════════════════════════════════════════════════════════════════════
# robocap-slam
# ═══════════════════════════════════════════════════════════════════════════
[feature.robocap.dependencies]
python = "3.10.*"
jaxtyping = ">=0.3.7,<0.4"
cuvslam = "==0.2.0"
opencv = ">=4.10,<5"
pyyaml = "*"
libstdcxx-ng = ">=14.2"
pyarrow = ">=20.0.0,<21"
pip = ">=25.1.1,<26"

[feature.robocap.pypi-dependencies]
robocap-slam = { path = "packages/robocap-slam", editable = true }
simplecv = { git = "https://github.com/pablovela5620/simplecv.git", branch = "main" }
tyro = ">=0.9,<1"

[feature.robocap.activation.env]
PACKAGE_DIR = "packages/robocap-slam"

[feature.robocap.tasks.robocap-download-example]
cmd = """test -d data/robocap/f408193e6447b3b0_session_14 || hf download pablovela5620/robocap-example --repo-type dataset --local-dir data/robocap"""
cwd = "packages/robocap-slam"
outputs = ["packages/robocap-slam/data/robocap/f408193e6447b3b0_session_14"]
description = "Download example Robocap dataset from HuggingFace"

[feature.robocap.tasks.robocap-track]
cmd = "python tools/track_odometry.py robocap"
cwd = "packages/robocap-slam"
depends-on = ["robocap-download-example"]
description = "Run multicamera visual odometry on Robocap data"

[feature.robocap.tasks.robocap-track-slam]
cmd = "python tools/track_slam.py robocap"
cwd = "packages/robocap-slam"
depends-on = ["robocap-download-example"]
description = "Run multicamera visual SLAM on Robocap data"

# ═══════════════════════════════════════════════════════════════════════════
# Environments
# ═══════════════════════════════════════════════════════════════════════════
[environments]
dev            = { features = ["ide", "dev"],                               solve-group = "dev",        no-default-feature = true }
monoprior      = { features = ["common", "cuda", "monoprior"],              solve-group = "monoprior",  no-default-feature = true }
monoprior-dev  = { features = ["common", "cuda", "monoprior", "dev"],       solve-group = "monoprior",  no-default-feature = true }
wilor          = { features = ["common", "cuda", "wilor"],                  solve-group = "wilor",      no-default-feature = true }
wilor-dev      = { features = ["common", "cuda", "wilor", "dev"],           solve-group = "wilor",      no-default-feature = true }
sam3d          = { features = ["common", "cuda", "sam3d"],                  solve-group = "sam3d",      no-default-feature = true }
sam3d-dev      = { features = ["common", "cuda", "sam3d", "dev"],           solve-group = "sam3d",      no-default-feature = true }
sam3-rerun     = { features = ["common", "cuda", "sam3-rerun"],             solve-group = "sam3-rerun", no-default-feature = true }
sam3-rerun-dev = { features = ["common", "cuda", "sam3-rerun", "dev"],      solve-group = "sam3-rerun", no-default-feature = true }
robocap        = { features = ["common", "robocap"],                        solve-group = "robocap",    no-default-feature = true }
robocap-dev    = { features = ["common", "robocap", "dev"],                 solve-group = "robocap",    no-default-feature = true }
