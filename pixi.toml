# ═══════════════════════════════════════════════════════════════════════════
# mast3r-slam
# ═══════════════════════════════════════════════════════════════════════════
[feature.mast3r-slam]
channels = [
    "https://prefix.dev/ai-demos",
    "https://conda.modular.com/max-nightly/",
    "conda-forge",
]
platforms = ["linux-64"]

[feature.mast3r-slam.dependencies]
python = "3.11.*"
torchcodec = "*"
eigen = ">=3.4.0,<4"
ffmpeg = ">=7.1.0"
open3d = ">=0.19.0,<0.20"
faiss = "*"
scikit-learn = "*"
matplotlib = "*"
trimesh = "*"
mojo = "*"

[feature.mast3r-slam.target.linux-64.dependencies]
lietorch = ">=0.3.0"
mast3r = { path = "packages/mast3r" }
asmk = { path = "packages/asmk" }

[feature.mast3r-slam.pypi-dependencies]
# mast3r-slam is the only pypi editable install remaining.
# lietorch is a prebuilt package from ai-demos channel.
# mast3r and asmk are pixi-build workspace packages.
mast3r-slam = { path = "packages/mast3r-slam", editable = true }
einops = ">=0.8.0"
evo = "*"
natsort = ">=8.4"
pykdtree = "*"
roma = "*"
pyaml = "*"

[feature.mast3r-slam.activation.env]
PACKAGE_DIR = "packages/mast3r-slam"

# NOTE: mast3r-slam-mojo-build env removed. The mojo compiler is available
# directly in the mast3r-slam feature (mojo = "*" + max-nightly channel).
# Installing mojo separately (not via the modular metapackage) avoids pulling
# in max-pipelines → uvicorn → starlette==1.0 which conflicts with gradio.
# See docs/customoplibrary-migration-plan.md for the full package hierarchy.

# ── Build tasks (CUDA extensions compiled via setuptools, no pip) ────────
[feature.mast3r-slam.tasks._build-cuda-kernels]
cmd = "python setup.py build_ext --inplace"
cwd = "packages/mast3r-slam"
description = "Build mast3r-slam CUDA backend kernels"
inputs = [
    "packages/mast3r-slam/setup.py",
    "packages/mast3r-slam/mast3r_slam/backend/src/*.cpp",
    "packages/mast3r-slam/mast3r_slam/backend/src/*.cu",
    "packages/mast3r-slam/mast3r_slam/backend/include/*.h",
]
outputs = ["packages/mast3r-slam/mast3r_slam/_backends*.so"]

# ── Mojo kernel build ──────────────────────────────────────────────────
[feature.mast3r-slam.tasks._build-mojo-kernels]
cmd = "cd packages/mast3r-slam && mojo build --emit shared-lib -o mast3r_slam_mojo_backends.so mast3r_slam/backend/mojo/mast3r_slam_mojo_backends.mojo"
description = "Build mast3r-slam Mojo backend kernels"
inputs = ["packages/mast3r-slam/mast3r_slam/backend/mojo/*.mojo"]
outputs = ["packages/mast3r-slam/mast3r_slam_mojo_backends*.so"]

# ── Download tasks (hidden, used as depends-on) ─────────────────────────
[feature.mast3r-slam.tasks._download-checkpoints]
cmd = """
hf download pablovela5620/mast3r-slam \
    MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric.pth \
    MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric_retrieval_codebook.pkl \
    MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric_retrieval_trainingfree.pth \
    --repo-type model --local-dir checkpoints/
"""
cwd = "packages/mast3r-slam"
description = "Download MASt3R-SLAM model checkpoints"
outputs = [
    "packages/mast3r-slam/checkpoints/MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric.pth",
]

[feature.mast3r-slam.tasks._download-example-data]
cmd = "hf download pablovela5620/mast3r-slam-example-data normal-apt-tour.mp4 livingroom-tour.mp4 --repo-type dataset --local-dir data/"
cwd = "packages/mast3r-slam"
outputs = [
    "packages/mast3r-slam/data/normal-apt-tour.mp4",
    "packages/mast3r-slam/data/livingroom-tour.mp4",
]
description = "Download example video data"

# ── Test baseline task ──────────────────────────────────────────────────
[feature.mast3r-slam.tasks._generate-test-baseline]
cmd = """python tools/mast3r_slam_inference.py \
  --dataset data/normal-apt-tour.mp4 --img-size 224 \
  --config config/test.yaml --max-frames 30 --no-viz \
  --rr-config.save tests/fixtures/baseline_30frames.rrd"""
depends-on = [
    "_build-cuda-kernels",
    "_build-mojo-kernels",
    "_download-checkpoints",
    "_download-example-data",
]
cwd = "packages/mast3r-slam"
description = "Generate baseline .rrd for regression tests (30 frames, deterministic)"
outputs = ["packages/mast3r-slam/tests/fixtures/baseline_30frames.rrd"]

# ── Demo tasks ───────────────────────────────────────────────────────────
[feature.mast3r-slam.tasks.example-quick]
cmd = "python tools/mast3r_slam_inference.py --dataset data/normal-apt-tour.mp4 --img-size 224 --config config/fast.yaml --max-frames 100"
depends-on = [
    "_build-mojo-kernels",
    "_download-checkpoints",
    "_download-example-data",
]
cwd = "packages/mast3r-slam"
description = "Run MASt3R-SLAM on first 100 frames (fast config, ~2 min)"

[feature.mast3r-slam.tasks.example-fast]
cmd = "python tools/mast3r_slam_inference.py --dataset data/normal-apt-tour.mp4 --img-size 224 --config config/fast.yaml"
depends-on = [
    "_build-mojo-kernels",
    "_download-checkpoints",
    "_download-example-data",
]
cwd = "packages/mast3r-slam"
description = "Run MASt3R-SLAM inference (fast config, 224px, full video)"

[feature.mast3r-slam.tasks.example-base]
cmd = "python tools/mast3r_slam_inference.py --dataset data/normal-apt-tour.mp4 --img-size 512 --config config/base.yaml"
depends-on = [
    "_build-mojo-kernels",
    "_download-checkpoints",
    "_download-example-data",
]
cwd = "packages/mast3r-slam"
description = "Run MASt3R-SLAM inference (base config, 512px)"

[feature.mast3r-slam.tasks.mast3r-slam-app]
cmd = "python tools/gradio-app.py"
depends-on = [
    "_build-mojo-kernels",
    "_download-checkpoints",
    "_download-example-data",
]
cwd = "packages/mast3r-slam"
description = "Launch MASt3R-SLAM Gradio web UI"

