[feature.sam3d.tasks.sam3d-mv-video-demo]
cmd = """
python tool/demo_mv_video.py \
    --max-frames 100 \
    hocap \
    --root-directory data/sample \
    --subject-id 8 \
    --sequence-name 20231024_180733
"""
