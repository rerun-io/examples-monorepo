# pysfm
# ═══════════════════════════════════════════════════════════════════════════
[feature.pysfm.dependencies]
python = "3.12.*"
pycolmap = "==4.0.2"
tyro = ">=0.9.1,<0.10"

[feature.pysfm.pypi-dependencies]
pysfm = { path = "packages/pysfm", editable = true }

[feature.pysfm.activation.env]
PACKAGE_DIR = "packages/pysfm"

# ── Download tasks ───────────────────────────────────────────────────────
[feature.pysfm.tasks._download-sfm-example]
cmd = """
test -d data/examples/sfm_reconstruction/Fountain || \
(mkdir -p data/examples/sfm_reconstruction && \
python -c "
import urllib.request, zipfile
urllib.request.urlretrieve('https://cvg-data.inf.ethz.ch/local-feature-evaluation-schoenberger2017/Strecha-Fountain.zip', '/tmp/fountain.zip')
zipfile.ZipFile('/tmp/fountain.zip').extractall('data/examples/sfm_reconstruction')
")
"""
cwd = "packages/pysfm"
description = "Download Fountain example dataset for SfM"

[feature.pysfm.tasks._download-unknown-rig]
cmd = "test -e data/examples/unknown-rig/cam1.mp4 || hf download pablovela5620/pycolmap-glomap-example --include 'unknown-rig/*.mp4' --repo-type dataset --local-dir data/examples/"
cwd = "packages/pysfm"
description = "Download unknown-rig example videos"

[feature.pysfm.tasks._download-calibrated-rig]
cmd = "test -e data/examples/calibrated-rig/video_dev1_session15_segment1_left-front.mp4 || hf download pablovela5620/pycolmap-glomap-example --include 'calibrated-rig/*.mp4' --repo-type dataset --local-dir data/examples/"
cwd = "packages/pysfm"
description = "Download calibrated-rig example videos"

# ── Demo tasks ───────────────────────────────────────────────────────────
[feature.pysfm.tasks.sfm-reconstruction-demo]
cmd = "python tools/demos/sfm_reconstruction.py --image-dir data/examples/sfm_reconstruction/Fountain/images --rr-config.save data/examples/sfm_reconstruction/fountain.rrd"
depends-on = ["_download-sfm-example"]
cwd = "packages/pysfm"
description = "Run COLMAP SfM reconstruction on Fountain dataset with Rerun viewer"

# ── App tasks ────────────────────────────────────────────────────────────
[feature.pysfm.tasks.sfm-reconstruction-app]
cmd = "python tools/nodes/sfm_reconstruction_app.py"
cwd = "packages/pysfm"
description = "Launch COLMAP SfM Gradio app with Rerun viewer"

[feature.pysfm.tasks.pysfm-vid-to-img-node]
cmd = "python tools/nodes/video_to_image_node.py"
depends-on = ["_download-unknown-rig"]
cwd = "packages/pysfm"
description = "Launch Video-to-Image frame extraction Gradio app with Rerun viewer"

[feature.pysfm.tasks.pysfm-vid-to-img-node-dev]
cmd = "gradio tools/nodes/video_to_image_node.py --watch-dirs $PIXI_PROJECT_ROOT/packages/pysfm/pysfm"
depends-on = ["_download-unknown-rig"]
cwd = "packages/pysfm"
description = "Video-to-Image Gradio app with hot reload"

[feature.pysfm.tasks.pysfm-vid-to-img-demo]
cmd = "python tools/demos/video_to_image.py --video-path data/examples/unknown-rig/cam1.mp4 --output-dir /tmp/video_to_image_output --rr-config.save /tmp/video_to_image_output/video_to_image.rrd"
depends-on = ["_download-unknown-rig"]
cwd = "packages/pysfm"
description = "Run video-to-image frame extraction CLI demo (saves .rrd)"

[feature.pysfm.tasks.pysfm-vid-recon-demo]
cmd = "python tools/demos/pycolmap_vid_recon.py --config.video-path data/examples/unknown-rig/cam1.mp4"
depends-on = ["_download-unknown-rig"]
cwd = "packages/pysfm"
description = "Monocular video reconstruction demo with Rerun viewer"

[feature.pysfm.tasks.brush-train-kitchen-5k]
cmd = """
python tools/brush/train_colmap_brush.py \
  --images-dir /home/pablo/0Dev/data/colmap-data/multicam/images/6g-night-nov-29-2024/kitchen-nov-29-2024-train/0100 \
  --model-dir /home/pablo/0Dev/data/colmap-data/multicam/colmap/6g-night-nov-29-2024/kitchen-nov-29-2024-train/0100-aliked-lightglue-globalmapper-overlap10-timed-20260320/rig/sparse/0 \
  --work-root /home/pablo/0Dev/data/colmap-data/multicam/brush/6g-night-nov-29-2024/kitchen-nov-29-2024-train/0100-global-rig \
  --steps 5000 \
  --eval-split-every 10 \
  --eval-every 1000 \
  --export-every 5000 \
  --experiment-name 5k
"""
cwd = "packages/pysfm"
description = "Train a first 5k-step Brush splat from the kitchen train 0100 rig model"

[feature.pysfm.target.linux-64.dependencies]
brush = "==0.3.0"

