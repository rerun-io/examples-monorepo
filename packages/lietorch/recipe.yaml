# rattler-build recipe for lietorch
# Builds Lie group CUDA extensions from upstream princeton-vl/lietorch
package:
  name: lietorch
  version: "0.3.0"

source:
  git: https://github.com/princeton-vl/lietorch.git
  rev: e7df86554156b36846008d8ddbcc4d8521a16554
  # Patches are applied to the cloned source before the build script runs.
  # See each .patch file for detailed comments on what it changes and why.
  patches:
    - patches/setup.py.patch
    - patches/pyproject.toml.patch

build:
  number: 0
  # CUDA extensions only build on x86_64 Linux (needs nvidia GPU + nvcc)
  skip:
    - not linux-64
  script:
    # Auto-detect the current GPU's compute capability instead of building
    # for all architectures. Cuts build time from ~30min to ~7min.
    - export TORCH_CUDA_ARCH_LIST="${TORCH_CUDA_ARCH_LIST:-$(nvidia-smi --query-gpu=compute_cap --format=csv,noheader | head -1 | tr -d ' ')}"
    # rattler-build uses $PREFIX for the host env (where eigen/torch live).
    # Our patched setup.py reads CONDA_PREFIX for eigen header paths.
    - export CONDA_PREFIX=$PREFIX
    # build_ext compiles the .so files, install copies them + Python code into $PREFIX
    - python setup.py build_ext install --prefix=$PREFIX

requirements:
  build:
    # C/C++ cross-compiler (provided by conda-forge compiler infrastructure)
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
  host:
    # Everything needed at compile time — torch provides CUDAExtension,
    # eigen provides linear algebra headers, cuda-* provide nvcc/runtime
    - python 3.11.*
    - setuptools
    - pytorch-gpu >=2.8.0
    - eigen >=3.4.0,<4
    - cuda-cudart-dev
    - cuda-crt
    - cuda-nvcc
  run:
    # Runtime deps — lietorch needs torch for its Python API
    - python 3.11.*
    - pytorch-gpu >=2.8.0
