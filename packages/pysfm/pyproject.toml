[project]
name = "pysfm"
version = "0.1.0"
description = "COLMAP SfM reconstruction through pycolmap with Rerun visualization"
requires-python = ">=3.11"

dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 150

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I"]
ignore = [
    "E501",   # Line too long
    "F722",   # jaxtyping
    "F821",   # jaxtyping
    "UP037",  # jaxtyping with type quotes
    "UP040",  # beartype compatibility
]
