[workspace]
name = "mast3r-slam-max-custom-ops"
channels = ["conda-forge", "https://conda.modular.com/max/"]
platforms = ["linux-64"]

# This nested workspace is still required. The root `mast3r-slam-dev`
# environment can build shared-library Mojo code, but it does not currently
# provide the Python `max.experimental.torch` package used by the custom-op
# loader and tests.
[system-requirements]
cuda = "12.9"

[dependencies]
python = "==3.14.3"
python-gil = "==3.14.3"
modular = "==26.2.0"
numpy = "*"
pytest = ">=8.0.0,<9"
eigen = ">=3.4.0,<4"
cuda-compiler = "*"
cuda-version = "12.9.*"
cuda-cudart-dev = "*"
cuda-crt = "*"
libcusparse-dev = "*"
cuda-driver-dev = "*"
cuda-nvcc = "*"
cuda-nvrtc-dev = "*"
cuda-nvtx = "*"
cuda-nvtx-dev = "*"
cuda-nvml-dev = "*"
cuda-profiler-api = "*"
cudnn = "*"
libcublas-dev = "*"
libcudss-dev = "*"
libcufile-dev = "*"
libcufft-dev = "*"
libcurand-dev = "*"
libcusolver-dev = "*"
cusparselt = "*"
libnvjitlink = "*"
pytorch-gpu = ">=2.8.0"
torchvision = "*"

[pypi-dependencies]
mast3r-slam = { path = "..", editable = true }

[activation.env]
PACKAGE_DIR = ".."

[tasks._build-cuda-kernels]
cmd = "python setup.py build_ext --inplace"
cwd = ".."
description = "Build mast3r-slam CUDA backend kernels in the MAX custom-op env"

[tasks.check-max-install]
cmd = "python -c \"import max; from max.experimental.torch import CustomOpLibrary; print('max:', max.__file__); print('custom_op_library:', CustomOpLibrary)\""
cwd = ".."
description = "Verify MAX Python APIs are installed"

[tasks.check-max-gn-ops]
cmd = "python -c \"from mast3r_slam.max_ops import load_gn_custom_ops; print(load_gn_custom_ops())\""
cwd = ".."
depends-on = ["check-max-install"]
description = "Load the GN MAX custom-op package"

[tasks.test-max-custom-ops]
cmd = "pytest tests/test_max_custom_ops.py -q"
cwd = ".."
depends-on = ["_build-cuda-kernels", "check-max-gn-ops"]
description = "Run MAX custom-op parity tests"

[tasks.bench-max-pose-retr]
cmd = "python tools/bench_max_pose_retr.py"
cwd = ".."
depends-on = ["_build-cuda-kernels", "check-max-gn-ops"]
description = "Benchmark the GN pose_retr MAX custom op"

[tasks.bench-max-pose-retr-sweep]
cmd = "python tools/bench_max_pose_retr_sweep.py"
cwd = ".."
depends-on = ["_build-cuda-kernels", "check-max-gn-ops"]
description = "Benchmark pose_retr across workload sizes"
