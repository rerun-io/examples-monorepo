[project]
authors = [{ name = "pablo vela", email = "pablovela5620@gmail.com" }]
dependencies = [
    # common: numpy, scipy, jaxtyping, rerun-sdk, gradio, gradio-rerun,
    #         huggingface_hub, hf-transfer, tqdm, pyserde, av, opencv
    "einops>=0.8.0",
    "icecream>=2.1.3",
    "tyro>=0.9.1",
    "lovely-numpy>=0.2.13,<0.3",
    "pandas>=2.3.3",
    "braceexpand>=0.1.7,<0.2",
    "roma>=1.5.4,<2",
    "pytorch-lightning>=2.5.6,<3",
    "yacs>=0.1.8,<0.2",
    "omegaconf>=2.3.0,<3",
    "termcolor>=3.2.0,<4",
    "spaces>=0.43.0",
    "monopriors>=0.3.2",
]
name = "sam3d_body"
requires-python = ">= 3.12"
version = "0.1.0"


[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
line-length = 150

[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]

ignore = [
    "E501",  # Line too long.
    "F722",  # Forward annotation false positive from jaxtyping. Should be caught by pyright.
    "F821",  # Forward annotation false positive from jaxtyping. Should be caught by pyright.
    "UP037", # Remove quotes from type, false positive when using jaxtyping
    "UP040", # Beartype fails if not using this for typealias

]

[tool.pyrefly]
project-includes = ["**/*"]
project-excludes = ["**/node_modules", "**/__pycache__", "**/*venv/**/*"]
