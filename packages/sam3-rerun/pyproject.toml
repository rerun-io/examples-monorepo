[project]
name = "sam3-rerun"
version = "0.1.0"
authors = [{ name = "pablo vela", email = "pablovela5620@gmail.com" }]
requires-python = ">=3.12"
dependencies = [
    "einops>=0.8.0",
    "tyro>=0.9.1",
]

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.ruff]
line-length = 150

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I"]
ignore = ["E501", "F722", "F821", "UP037", "UP040"]

