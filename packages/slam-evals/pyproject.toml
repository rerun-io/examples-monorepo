[project]
name = "slam-evals"
version = "0.1.0"
authors = [{name = "Pablo Vela", email = "pablovela5620@gmail.com"}]
requires-python = ">=3.10"
dependencies = [
    # common: numpy, scipy, jaxtyping, rerun-sdk, av, huggingface_hub, tqdm, pyserde
    "pyyaml",
    "pyarrow",
    "tyro",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 150

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I"]
ignore = [
    "E501",   # Line too long
    "F722",   # jaxtyping forward annotation false positive
    "F821",   # jaxtyping forward annotation false positive
    "UP037",  # Remove quotes false positive with jaxtyping
    "UP040",  # Beartype requires TypeAlias, not PEP 695 type
]

[tool.vulture]
paths = ["slam_evals", "tests", "tools"]
exclude = ["*/.pixi/*", "*/__pycache__/*", "*/build/*", "*/dist/*", "*/node_modules/*"]
sort_by_size = true
min_confidence = 60

[tool.pytest.ini_options]
# Silence simplecv's `from_parent` DeprecationWarning (needs an upstream fix
# in simplecv; until then we don't want it cluttering our test output).
filterwarnings = [
    "ignore:.*from_parent.*deprecated.*:DeprecationWarning",
]
