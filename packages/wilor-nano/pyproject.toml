[project]
authors = [{ name = "pablo vela", email = "pablovela5620@gmail.com" }]
dependencies = [
    # common: numpy, scipy, jaxtyping, rerun-sdk, gradio, gradio-rerun,
    #         huggingface_hub, hf-transfer, tqdm, pyserde, av, opencv
    "timm",
    "einops",
    "ultralytics==8.3.162",       # needed to avoid weights_only bug in pytorch 2.7+
    "scikit-image",
    "roma",
    "daggr>=0.7.0",
]
name = "wilor-nano"
requires-python = ">= 3.11"
version = "0.1.0"

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.ruff]
line-length = 150

[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]

ignore = [
    "E501",  # Line too long.
    "F722",  # Forward annotation false positive from jaxtyping. Should be caught by pyright.
    "F821",  # Forward annotation false positive from jaxtyping. Should be caught by pyright.
    "UP037",
]
