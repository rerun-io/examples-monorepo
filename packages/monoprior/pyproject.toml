[project]
name = "monopriors"
version = "0.3.2"
description = "Monocular Geometric Priors"
requires-python = ">=3.11.0"
readme = "README.md"

dependencies = [
    # common: numpy, scipy, jaxtyping, rerun-sdk, gradio, gradio-rerun,
    #         huggingface_hub, hf-transfer, tqdm, pyserde, av, opencv
    "geffnet>=1.0.2",
    "omnidata-tools>=0.0.23",
    "pytorch-lightning>=2.5.1,<3",
    "diffusers[torch]>=0.32.2",
    "timm>=1.0.15,<2",
    "onnxruntime-gpu<1.23.0",
    "sam3-rerun>=0.1.0",
]

[tool.uv.sources]
sam3-rerun = { path = "../sam3-rerun", editable = true }

[tool.setuptools.packages.find]
include = ["monopriors*", "tools*"]

[tool.ruff]
line-length = 150
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]

ignore = [
    "E501",  # Line too long.
    "F722",  # Forward annotation false positive from jaxtyping. Should be caught by pyright.
    "F821",  # Forward annotation false positive from jaxtyping. Should be caught by pyright.
    "UP037", # Remove quotes from type, false positive when using jaxtyping
]

[tool.pyrefly]
project-includes = ["**/*"]
project-excludes = ["**/node_modules", "**/__pycache__", "**/*venv/**/*"]
