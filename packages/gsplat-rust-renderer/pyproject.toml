[project]
name = "gsplat-rust-renderer"
version = "0.1.0"
description = "Gaussian splat logging helper and PLY parser for the custom Rerun viewer"
authors = [{name = "Pablo Vela", email = "pablovela5620@gmail.com"}]
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 150

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I"]
ignore = [
    "E501",   # Line too long
    "F722",   # jaxtyping forward annotation false positive
    "F821",   # jaxtyping forward annotation false positive
    "UP037",  # Remove quotes false positive with jaxtyping
    "UP040",  # Beartype requires TypeAlias, not PEP 695 type
]
