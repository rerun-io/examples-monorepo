[package]
name = "gsplat-rerun-minimal"
version = "0.30.2"
edition = "2024"

[dependencies]
anyhow = "1.0"
bytemuck = { version = "1.23", features = ["derive"] }
glam = "0.30"
rayon = "1.11"
re_crash_handler = "=0.30.2"
re_grpc_server = "=0.30.2"
re_log_channel = "=0.30.2"
re_log = "=0.30.2"
re_log_types = "=0.30.2"
re_query = "=0.30.2"
re_renderer = "=0.30.2"
re_sdk = "=0.30.2"
re_sdk_types = "=0.30.2"
re_view = "=0.30.2"
re_view_spatial = "=0.30.2"
re_viewer = "=0.30.2"
re_viewer_context = "=0.30.2"
rerun = { version = "=0.30.2", features = ["native_viewer"] }
tokio = { version = "1.50", features = ["macros", "rt-multi-thread"] }
