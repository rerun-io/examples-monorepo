# Monorepo-wide Pyrefly config. Keep all Pyrefly settings here and do not add
# package-local `[tool.pyrefly]` sections in `packages/*/pyproject.toml`.
project-includes = [
    "packages/monoprior/monopriors/**/*",
    "packages/prompt-da/src/**/*",
    "packages/wilor-nano/src/**/*",
    "packages/sam3d-body-rerun/src/**/*",
    "packages/sam3-rerun/src/**/*",
    "packages/robocap-slam/robocap_slam/**/*",
    "packages/pysfm/pysfm/**/*",
    "packages/vistadream/src/**/*",
    "packages/pyvrs-viewer/src/**/*",
    "packages/gsplat-rust-renderer/gsplat_rust_renderer/**/*",
    "packages/mast3r-slam/mast3r_slam/**/*",
    "packages/dpvo/dpvo/**/*",
]
project-excludes = ["**/node_modules", "**/__pycache__", "**/*venv/**/*"]

# Disable heuristics so pyrefly uses only our explicit search-path,
# not per-file guesses (critical for monorepo with multiple source roots)
disable-search-path-heuristics = true

# Source roots — where first-party imports are resolved from
search-path = [
    "packages/monoprior",
    "packages/prompt-da/src",
    "packages/wilor-nano/src",
    "packages/sam3d-body-rerun/src",
    "packages/sam3-rerun/src",
    "packages/robocap-slam",
    "packages/pysfm",
    "packages/vistadream/src",
    "packages/pyvrs-viewer/src",
    "packages/gsplat-rust-renderer",
    "packages/mast3r-slam",
    "packages/dpvo",
]

# Third-party packages — all *-dev env site-packages so pyrefly can resolve
# any import regardless of which package file is open.
# Requires all *-dev envs installed (pixi install -a)
site-package-path = [
    # Per-package envs for package-specific deps.
    # Common deps (rerun, numpy, etc.) are resolved from the python-interpreter-path
    # (dev env) automatically — no need to list .pixi/envs/dev here.
    ".pixi/envs/monoprior-dev/lib/python3.12/site-packages",
    ".pixi/envs/prompt-da-dev/lib/python3.12/site-packages",
    ".pixi/envs/wilor-dev/lib/python3.12/site-packages",
    ".pixi/envs/sam3d-body-dev/lib/python3.12/site-packages",
    ".pixi/envs/sam3-rerun-dev/lib/python3.12/site-packages",
    ".pixi/envs/robocap-dev/lib/python3.10/site-packages",
    ".pixi/envs/pysfm-dev/lib/python3.12/site-packages",
    ".pixi/envs/vistadream-dev/lib/python3.12/site-packages",
    ".pixi/envs/pyvrs-viewer-dev/lib/python3.12/site-packages",
    ".pixi/envs/gsplat-rust-renderer-dev/lib/python3.12/site-packages",
    ".pixi/envs/mast3r-slam-dev/lib/python3.11/site-packages",
    # rerun-sdk uses a .pth file (rerun_sdk.pth) that adds a subdirectory
    # to sys.path at runtime.  Pyrefly doesn't process .pth files, so we
    # add the subdirectory explicitly.
    ".pixi/envs/mast3r-slam-dev/lib/python3.11/site-packages/rerun_sdk",
    ".pixi/envs/dpvo-dev/lib/python3.11/site-packages",
]

python-interpreter-path = ".pixi/envs/dev/bin/python"
